<!DOCTYPE html>
<html>
<head>
    <title>Générateur d'images placeholder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .canvas-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        canvas {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: #6d28d9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover {
            background: #5b21b6;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Générateur d'images placeholder pour votre portfolio</h1>
        <p>Cliquez sur le bouton ci-dessous pour générer des images placeholder colorées pour votre portfolio. Les images seront automatiquement téléchargées.</p>
        <button id="generate">Générer et télécharger les images</button>
        
        <div class="canvas-container">
            <canvas id="canvas1" width="800" height="600"></canvas>
            <canvas id="canvas2" width="800" height="600"></canvas>
            <canvas id="canvas3" width="800" height="600"></canvas>
            <canvas id="canvas4" width="800" height="600"></canvas>
            <canvas id="canvas5" width="800" height="600"></canvas>
            <canvas id="canvas6" width="800" height="600"></canvas>
        </div>
    </div>

    <script>
        const titles = [
            "Site E-commerce",
            "Application de Gestion",
            "Site Vitrine Entreprise",
            "Design UI/UX",
            "Blog Personnel",
            "Application Mobile"
        ];
        
        const filenames = [
            "ecommerce-website.jpg",
            "management-app.jpg",
            "corporate-website.jpg",
            "ui-design.jpg",
            "blog-website.jpg",
            "mobile-app.jpg"
        ];
        
        const colors = [
            "#3498db", // Bleu
            "#9b59b6", // Violet
            "#2ecc71", // Vert
            "#e74c3c", // Rouge
            "#f39c12", // Orange
            "#1abc9c"  // Turquoise
        ];
        
        function drawPlaceholder(canvas, title, color, index) {
            const ctx = canvas.getContext("2d");
            
            // Fond
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Motif
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 100 + 50;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Texte
            ctx.fillStyle = "white";
            ctx.font = "bold 48px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(title, canvas.width / 2, canvas.height / 2);
            
            // Numéro du projet
            ctx.font = "bold 24px Arial";
            ctx.fillText("Projet " + (index + 1), canvas.width / 2, canvas.height / 2 + 60);
        }
        
        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL("image/jpeg", 0.8);
            link.click();
        }
        
        document.getElementById("generate").addEventListener("click", function() {
            for (let i = 0; i < 6; i++) {
                const canvas = document.getElementById("canvas" + (i + 1));
                drawPlaceholder(canvas, titles[i], colors[i], i);
                downloadCanvas(canvas, filenames[i]);
            }
        });
        
        // Dessiner les placeholders au chargement
        window.onload = function() {
            for (let i = 0; i < 6; i++) {
                const canvas = document.getElementById("canvas" + (i + 1));
                drawPlaceholder(canvas, titles[i], colors[i], i);
            }
        };
    </script>
</body>
</html>
