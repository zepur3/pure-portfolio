    <text x="90" y="35" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-weight="bold" font-size="24">5 min</text>
    <text x="90" y="58" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Création</text>
  </g>
  <g transform="translate(810, 500)">
