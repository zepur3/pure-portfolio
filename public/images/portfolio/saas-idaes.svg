  <rect x="100" y="120" width="400" height="50" rx="8" fill="#1a1a2e"/>
  <text x="300" y="152" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-weight="bold" font-size="24">SAAS-IDAES</text>
  <text x="600" y="250" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-weight="bold" font-size="36">Ton site pro, en ligne</text>
  <text x="600" y="295" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-weight="bold" font-size="36">en 5 minutes.</text>
  <text x="600" y="340" text-anchor="middle" fill="#888888" font-family="system-ui" font-size="16">Pas besoin de savoir coder. Réponds à quelques questions,</text>
  <text x="600" y="365" text-anchor="middle" fill="#888888" font-family="system-ui" font-size="16">choisis tes couleurs, et ton site est prêt.</text>
  <rect x="420" y="400" width="360" height="50" rx="25" fill="url(#grad1)"/>
  <text x="600" y="432" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-weight="bold" font-size="16">Créer mon site gratuitement</text>
  <g transform="translate(150, 500)">
    <rect width="180" height="80" rx="12" fill="#1a1a2e"/>
