    <text x="90" y="58" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Sites créés</text>
  </g>
  <g transform="translate(370, 500)">
    <rect width="180" height="80" rx="12" fill="#1a1a2e"/>
    <text x="90" y="35" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-weight="bold" font-size="24">4.9/5</text>
    <text x="90" y="58" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Satisfaction</text>
  </g>
  <g transform="translate(590, 500)">
