    <text x="90" y="35" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-weight="bold" font-size="24">24h</text>
    <text x="90" y="58" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Support</text>
