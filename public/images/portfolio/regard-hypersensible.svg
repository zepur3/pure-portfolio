<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#faf7f5"/>
  <rect x="0" y="0" width="1200" height="60" fill="#ffffff"/>
  <circle cx="30" cy="30" r="8" fill="#ff5f57"/>
  <circle cx="55" cy="30" r="8" fill="#febc2e"/>
  <circle cx="80" cy="30" r="8" fill="#28c840"/>
  <rect x="200" y="20" width="800" height="20" rx="10" fill="#f0ebe6"/>
  <text x="600" y="35" text-anchor="middle" fill="#999" font-family="system-ui" font-size="12">www.regard-dhypersensible.fr</text>
  <rect x="0" y="60" width="1200" height="4" fill="url(#grad2)"/>
  <text x="600" y="200" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="42">Regard d'Hyper(sens)ible</text>
  <text x="600" y="260" text-anchor="middle" fill="#8b7355" font-family="Georgia, serif" font-style="italic" font-size="20">Une hypersensible dans une société insensible</text>
  <line x1="500" y1="290" x2="700" y2="290" stroke="#d4c5b0" stroke-width="2"/>
  <text x="600" y="340" text-anchor="middle" fill="#666666" font-family="Georgia, serif" font-size="15">Je m'appelle Evagonie. Je suis une hypersensible.</text>
  <text x="600" y="365" text-anchor="middle" fill="#666666" font-family="Georgia, serif" font-size="15">Je me sens parfois en décalage, c'est pourquoi j'écris</text>
  <text x="600" y="390" text-anchor="middle" fill="#666666" font-family="Georgia, serif" font-size="15">pour comprendre ce que je ressens.</text>
  <g transform="translate(100, 440)">
    <rect width="300" height="180" rx="12" fill="#ffffff" stroke="#e8e0d8" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="100" rx="12" fill="#f5efe8"/>
    <text x="150" y="130" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">Hypersensible : avoir un</text>
    <text x="150" y="150" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">troisième oeil...</text>
    <text x="150" y="170" text-anchor="middle" fill="#999" font-family="system-ui" font-size="11">Article</text>
  </g>
  <g transform="translate(450, 440)">
    <rect width="300" height="180" rx="12" fill="#ffffff" stroke="#e8e0d8" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="100" rx="12" fill="#ede6df"/>
    <text x="150" y="130" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">Pollution visuelle : une</text>
    <text x="150" y="150" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">agression du quotidien...</text>
    <text x="150" y="170" text-anchor="middle" fill="#999" font-family="system-ui" font-size="11">Article</text>
  </g>
  <g transform="translate(800, 440)">
    <rect width="300" height="180" rx="12" fill="#ffffff" stroke="#e8e0d8" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="100" rx="12" fill="#f0e8e0"/>
    <text x="150" y="130" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">Être hypersensible au</text>
    <text x="150" y="150" text-anchor="middle" fill="#2d2d2d" font-family="Georgia, serif" font-weight="bold" font-size="13">travail : l'horreur...</text>
    <text x="150" y="170" text-anchor="middle" fill="#999" font-family="system-ui" font-size="11">Article</text>
  </g>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4c5b0"/>
      <stop offset="50%" style="stop-color:#8b7355"/>
      <stop offset="100%" style="stop-color:#d4c5b0"/>
    </linearGradient>
  </defs>
</svg>
