<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1f1f1f" />
  <rect x="150" y="100" width="100" height="100" fill="#8b5cf6" opacity="0.6" rx="10" ry="10">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite" />
  </rect>
  <circle cx="200" cy="150" r="40" fill="#4c1d95" opacity="0.8">
    <animate attributeName="r" values="40;45;40" dur="2s" repeatCount="indefinite" />
  </circle>
  <path d="M180,130 L220,170 M220,130 L180,170" stroke="#f5f3ff" stroke-width="5" stroke-linecap="round" />
</svg>
